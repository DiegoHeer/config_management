services:
  romm:
    container_name: romm
    image: rommapp/romm:4.7.0
    restart: unless-stopped
    environment:
      - DB_HOST=romm_mariadb
      - DB_NAME=romm
      - DB_USER=romm-user
      - DB_PASSWD=${MARIADB_PASSWORD}
      - ROMM_AUTH_SECRET_KEY=${ROMM_AUTH_SECRET_KEY}
      - STEAMGRIDDB_API_KEY=${STEAMGRIDDB_API_KEY}
      - RETROACHIEVEMENTS_API_KEY=${RETROACHIEVEMENTS_API_KEY}
      - SCREENSCRAPER_USER=${SCREENSCRAPER_USER}
      - SCREENSCRAPER_PASSWORD=${SCREENSCRAPER_PASSWORD}
      - LAUNCHBOX_API_ENABLED=true
      - HASHEOUS_API_ENABLED=true
      - HLTB_API_ENABLED=true
    volumes:
      - ./romm/resources:/romm/resources
      - ./romm/redis:/redis-data
      - /media/hd2/data/media/games:/romm/library
      - ./romm/assets:/romm/assets
      - ./romm/config:/romm/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.romm.rule=Host(`romm.local.dynabase.nl`)"
      - "traefik.http.routers.romm.entrypoints=https"
      - "traefik.http.routers.romm.tls=true"
      - "traefik.http.services.romm.loadbalancer.server.port=8080"
    depends_on:
      romm_mariadb:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s

  romm_mariadb:
    container_name: romm_mariadb
    image: mariadb:11.8.6
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - ./romm/mysql:/var/lib/mysql
    healthcheck:
      test: [CMD, healthcheck.sh, --connect, --innodb_initialized]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    external: true
    name: home_server_network
