services:
  jellyfin:
    container_name: jellyfin
    image: linuxserver/jellyfin:10.11.6
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.dynabase.nl`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /media/hd2/data:/data
      - ./jellyfin/config:/config
      - /dev/dri:/dev/dri
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:v3.1.0
    init: true
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.dynabase.nl`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Amsterdam
    volumes:
      - ./seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  gluetun:
    container_name: gluetun
    image: qmcgaw/gluetun:v3.41.1
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # qBittorrent (port 8080)
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.dynabase.nl`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      # Prowlarr (port 9696)
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.dynabase.nl`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      # Sonarr (port 8989)
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.dynabase.nl`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      # Radarr (port 7878)
      - "traefik.http.routers.radarr.rule=Host(`radarr.dynabase.nl`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      # SABnzbd (port 8085)
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.dynabase.nl`)"
      - "traefik.http.routers.sabnzbd.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.routers.sabnzbd.service=sabnzbd"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8085"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./gluetun:/gluetun
    environment:
      - TZ=Europe/Amsterdam
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${TRANSMISSION_OPENVPN_USERNAME}
      - OPENVPN_PASSWORD=${TRANSMISSION_OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=Netherlands,Belgium
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 20s
      retries: 5

  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    volumes:
      - ./qbittorrent/config:/config
      - /media/hd2/data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr:2.3.0
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./prowlarr/config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:4.0.16
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Amsterdam
    volumes:
      - ./sonarr/config:/config
      - /media/hd2/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  radarr:
    container_name: radarr
    image: linuxserver/radarr:6.0.4
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./radarr/config:/config
      - /media/hd2/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  profilarr:
    container_name: profilarr
    image: santiagosayshey/profilarr:v1.1.4
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.profilarr.rule=Host(`profilarr.dynabase.nl`)"
      - "traefik.http.routers.profilarr.entrypoints=websecure"
      - "traefik.http.routers.profilarr.tls=true"
      - "traefik.http.services.profilarr.loadbalancer.server.port=6868"
    volumes:
      - ./profilarr/config:/config
    environment:
      - TZ=Europe/Amsterdam
    ports:
      - 6868:6868
    healthcheck:
      test: ["CMD", "wget", "--spider", "--no-verbose", "http://localhost:6868"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sabnzbd:
    container_name: sabnzbd
    image: lscr.io/linuxserver/sabnzbd:4.5.5
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./sabnzbd/config:/config
      - /media/hd2/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:0.59.0
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.navidrome.rule=Host(`navidrome.dynabase.nl`)"
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls=true"
      - "traefik.http.services.navidrome.loadbalancer.server.port=4533"
    user: 1000:1000
    volumes:
      - ./navidrome:/data
      - /media/hd2/data/media/music:/music:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4533"]
      interval: 10s
      timeout: 5s
      retries: 5

  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:2.33.1
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.dynabase.nl`)"
      - "traefik.http.routers.audiobookshelf.entrypoints=websecure"
      - "traefik.http.routers.audiobookshelf.tls=true"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - /media/hd2/data/media/audiobooks:/audiobooks
      - /media/hd2/data/media/podcasts:/podcasts
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:80/healthcheck || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  grimmory:
    container_name: grimmory
    image: grimmory/grimmory:v2.3.0
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grimmory.rule=Host(`grimmory.dynabase.nl`)"
      - "traefik.http.routers.grimmory.entrypoints=websecure"
      - "traefik.http.routers.grimmory.tls=true"
      - "traefik.http.services.grimmory.loadbalancer.server.port=6060"
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Europe/Amsterdam
      - DATABASE_URL=jdbc:mariadb://grimmory_mariadb:3306/grimmory
      - DATABASE_USERNAME=${GRIMMORY_DB_USER}
      - DATABASE_PASSWORD=${GRIMMORY_DB_PASSWORD}
    depends_on:
      grimmory_mariadb:
        condition: service_healthy
    volumes:
      - ./grimmory/data:/app/data
      - ./grimmory/bookdrop:/bookdrop
      - /media/hd2/data/media/books:/books
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: wget -q -O - http://localhost:6060/api/v1/healthcheck || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  grimmory_mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.5
    container_name: grimmory_mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - MYSQL_ROOT_PASSWORD=${GRIMMORY_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=grimmory
      - MYSQL_USER=${GRIMMORY_DB_USER}
      - MYSQL_PASSWORD=${GRIMMORY_DB_PASSWORD}
    volumes:
      - ./grimmory/mariadb/config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    external: true
    name: home_server_network
