services:
  jellyfin:
    container_name: jellyfin
    image: linuxserver/jellyfin:10.11.8@sha256:c796353f655c4be9911bf4594a25bb8da6341c5918a535a16b0bf1029123fc1c
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.local.dynabase.nl`)"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /media/hd2/data:/data
      - /home/diego/services_data/media/jellyfin/config:/config
      - /dev/dri:/dev/dri
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
    init: true
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.local.dynabase.nl`)"
      - "traefik.http.routers.seerr.entrypoints=https"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Amsterdam
    volumes:
      - /home/diego/services_data/media/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  gluetun:
    container_name: gluetun
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    restart: unless-stopped
    env_file: secrets.enc.env
    labels:
      - "traefik.enable=true"
      # qBittorrent (port 8080)
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.local.dynabase.nl`)"
      - "traefik.http.routers.qbittorrent.entrypoints=https"
      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      # Prowlarr (port 9696)
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.local.dynabase.nl`)"
      - "traefik.http.routers.prowlarr.entrypoints=https"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      # Sonarr (port 8989)
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.local.dynabase.nl`)"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      # Radarr (port 7878)
      - "traefik.http.routers.radarr.rule=Host(`radarr.local.dynabase.nl`)"
      - "traefik.http.routers.radarr.entrypoints=https"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      # SABnzbd (port 8085)
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.local.dynabase.nl`)"
      - "traefik.http.routers.sabnzbd.entrypoints=https"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.routers.sabnzbd.service=sabnzbd"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8085"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /home/diego/services_data/media/gluetun:/gluetun
    environment:
      - TZ=Europe/Amsterdam
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=openvpn
      - SERVER_COUNTRIES=Netherlands,Belgium
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 20s
      retries: 5

  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:5.1.4@sha256:1fc78c81850d658f17701bfa9d8de58ccc12ff27d36a9a176c6299e55aaf4b4e
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    volumes:
      - /home/diego/services_data/media/qbittorrent/config:/config
      - /media/hd2/data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr:2.3.5@sha256:6df73ab9e99d0dbaad27c39d8a47c600333eebea80fcb56253a0bb8b630c8115
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/diego/services_data/media/prowlarr/config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:4.0.17@sha256:e6c9a091735fede0c2a205c69e7d4c2f0188eaf2bec7e42d8a26c017e5f2a910
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Amsterdam
    volumes:
      - /home/diego/services_data/media/sonarr/config:/config
      - /media/hd2/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  radarr:
    container_name: radarr
    image: linuxserver/radarr:6.1.1@sha256:6f1dda18354ea7f28cead8f6d099fc8222498c3ae165f567d504ed04d70980d7
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/diego/services_data/media/radarr/config:/config
      - /media/hd2/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  profilarr:
    container_name: profilarr
    image: santiagosayshey/profilarr:v1.1.4@sha256:8a514f8429cd33885166facc9eb6504fa9ded056c737609e5e8ef32ae0afb350
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.profilarr.rule=Host(`profilarr.local.dynabase.nl`)"
      - "traefik.http.routers.profilarr.entrypoints=https"
      - "traefik.http.routers.profilarr.tls=true"
      - "traefik.http.services.profilarr.loadbalancer.server.port=6868"
    volumes:
      - /home/diego/services_data/media/profilarr/config:/config
    environment:
      - TZ=Europe/Amsterdam
    ports:
      - 6868:6868
    healthcheck:
      test: ["CMD", "wget", "--spider", "--no-verbose", "http://localhost:6868"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sabnzbd:
    container_name: sabnzbd
    image: lscr.io/linuxserver/sabnzbd:4.5.5@sha256:7ac6fe8a521c7099e1768af90529dfee5976b87c7dccffdcc9ced00149e1aedb
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/diego/services_data/media/sabnzbd/config:/config
      - /media/hd2/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:0.61.2@sha256:9fa40b3d8dec43ceb2213d1fa551da3dcfef6ac6d19c2e534efb92527c2bafd2
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.navidrome.rule=Host(`navidrome.local.dynabase.nl`)"
      - "traefik.http.routers.navidrome.entrypoints=https"
      - "traefik.http.routers.navidrome.tls=true"
      - "traefik.http.services.navidrome.loadbalancer.server.port=4533"
    user: 1000:1000
    volumes:
      - /home/diego/services_data/media/navidrome:/data
      - /media/hd2/data/media/music:/music:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4533"]
      interval: 10s
      timeout: 5s
      retries: 5

  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:2.33.1@sha256:a4a5841bba093d81e5f4ad1eaedb4da3fda6dbb2528c552349da50ad1f7ae708
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.local.dynabase.nl`)"
      - "traefik.http.routers.audiobookshelf.entrypoints=https"
      - "traefik.http.routers.audiobookshelf.tls=true"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
    volumes:
      - /home/diego/services_data/media/audiobookshelf/config:/config
      - /home/diego/services_data/media/audiobookshelf/metadata:/metadata
      - /media/hd2/data/media/audiobooks:/audiobooks
      - /media/hd2/data/media/podcasts:/podcasts
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:80/healthcheck || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  grimmory:
    container_name: grimmory
    image: grimmory/grimmory:v2.3.0@sha256:9014247f591074529894f81115ca40f899db697e89f72c2fe91ec530e3f19597
    restart: unless-stopped
    env_file: secrets.enc.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grimmory.rule=Host(`grimmory.local.dynabase.nl`)"
      - "traefik.http.routers.grimmory.entrypoints=https"
      - "traefik.http.routers.grimmory.tls=true"
      - "traefik.http.services.grimmory.loadbalancer.server.port=6060"
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Europe/Amsterdam
      - DATABASE_URL=jdbc:mariadb://grimmory_mariadb:3306/grimmory
    depends_on:
      grimmory_mariadb:
        condition: service_healthy
    volumes:
      - /home/diego/services_data/media/grimmory/data:/app/data
      - /home/diego/services_data/media/grimmory/bookdrop:/bookdrop
      - /media/hd2/data/media/books:/books
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: wget -q -O - http://localhost:6060/api/v1/healthcheck || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  grimmory_mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.9-r0-ls212@sha256:8ea7a10e36dfe229cd4f91a12fb2c8ac40bd0c4b2276e472de8f7835aa360fcd
    container_name: grimmory_mariadb
    restart: unless-stopped
    env_file: secrets.enc.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - MYSQL_DATABASE=grimmory
    volumes:
      - /home/diego/services_data/media/grimmory/mariadb/config:/config
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    external: true
    name: home_server_network
