services:

  it-tools:
    container_name: it-tools
    image: corentinth/it-tools:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

  bentopdf:
    container_name: bentopdf
    image: bentopdf/bentopdf:latest
    restart: unless-stopped
    healthcheck:
      test: wget --spider http://localhost:8080 > /dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  grist:
    container_name: grist
    image: gristlabs/grist:1.7.10
    restart: unless-stopped
    environment:
      - PORT=9999
      - GRIST_DEFAULT_EMAIL=${GRIST_DEFAULT_EMAIL}
    volumes:
      - ./grist/persist:/persist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/status"]
      interval: 30s
      retries: 3
      timeout: 5s
      start_period: 10s
      start_interval: 5s

  docuseal:
    container_name: docuseal
    image: docuseal/docuseal:2.3.0
    restart: unless-stopped
    volumes:
      - ./docuseal:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  changedetection:
    container_name: changedetection
    image: ghcr.io/dgtlmoon/changedetection.io
    restart: unless-stopped
    volumes:
      - ./changedetection:/datastore
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import sys, urllib.request; sys.exit(1) if 200 != urllib.request.urlopen('http://localhost:5000/').status else sys.exit(0)\""]  # yamllint disable-line rule:line-length
      interval: 60s
      timeout: 2s
      retries: 5

  tandoor:
    container_name: tandoor
    image: vabene1111/recipes:2.3.6
    restart: unless-stopped
    environment:
      - SECRET_KEY=${TANDOOR_SECRET_KEY}
      - DB_ENGINE=django.db.backends.postgresql
      - POSTGRES_HOST=tandoor_postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=djangodb
      - POSTGRES_PASSWORD=${TANDOOR_POSTGRES_PASSWORD}
      - POSTGRES_DB=djangodb
    volumes:
      - ./tandoor/staticfiles:/opt/recipes/staticfiles
      - ./tandoor/mediafiles:/opt/recipes/mediafiles
    depends_on:
      tandoor_postgres:
        condition: service_healthy
    healthcheck:
      test: wget --spider --no-verbose http://localhost:80/openapi/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  tandoor_postgres:
    container_name: tandoor_postgres
    restart: unless-stopped
    image: postgres:16-alpine
    volumes:
      - ./tandoor/postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=djangodb
      - POSTGRES_PASSWORD=${TANDOOR_POSTGRES_PASSWORD}
      - POSTGRES_DB=djangodb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djangodb -d djangodb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dockhand:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


networks:
  default:
    external: true
    name: home_server_network
