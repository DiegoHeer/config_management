services:
  doco-cd:
    container_name: doco-cd
    image: ghcr.io/kimdre/doco-cd:latest
    restart: unless-stopped
    cap_drop:
      - ALL
    environment:
      TZ: Europe/Amsterdam
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SOPS_AGE_KEY_FILE: /run/secrets/sops_age_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - doco-cd-data:/data
    secrets:
      - sops_age_key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.doco-cd.rule=Host(`doco-cd.dynabase.nl`)"
      - "traefik.http.routers.doco-cd.entrypoints=https"
      - "traefik.http.routers.doco-cd.tls=true"
      - "traefik.http.services.doco-cd.loadbalancer.server.port=80"

secrets:
  sops_age_key:
    file: /home/diego/.config/sops/age/keys.txt

volumes:
  doco-cd-data:

networks:
  default:
    external: true
    name: home_server_network
