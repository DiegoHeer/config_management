services:
  beszel:
    container_name: beszel
    image: henrygd/beszel:0.18.2
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./beszel:/beszel_data
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 5s

  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:0.18.2
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /media/hd1/.beszel:/extra-filesystems/sdb1:ro
      - /media/hd2/.beszel:/extra-filesystems/sdd1:ro
      - /media/hd3/.beszel:/extra-filesystems/sde1:ro
      - ./beszel/agent_data:/var/lib/beszel-agent
    environment:
      LISTEN: 45876
      KEY: ${BESZEL_AGENT_KEY}
      TOKEN: ${BESZEL_AGENT_TOKEN}
      HUB_URL: https://beszel.dynabase.nl
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      beszel:
        condition: service_healthy

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:v10.1.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dozzle:/data
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 3s
      timeout: 30s
      retries: 5
      start_period: 30s

  portracker:
    container_name: portracker
    image: mostafawahied/portracker:latest
    restart: unless-stopped
    pid: "host"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./portracker/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:4999/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


networks:
  default:
    external: true
    name: home_server_network
