services:

  paperclip:
    container_name: paperclip
    image: reeoss/paperclipai-paperclip@sha256:677649a2ea0571cc83ab8cff2e1d29343c0641684113b464853c4fde16809e46
    restart: unless-stopped
    env_file: paperclip.enc.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperclip.rule=Host(`paperclip.local.dynabase.nl`)"
      - "traefik.http.routers.paperclip.entrypoints=https"
      - "traefik.http.routers.paperclip.tls=true"
      - "traefik.http.services.paperclip.loadbalancer.server.port=3100"
    environment:
      - HOST=0.0.0.0
      - PORT=3100
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_INSTANCE_ID=default
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=private
      - PAPERCLIP_PUBLIC_URL=https://paperclip.local.dynabase.nl
      - NODE_ENV=production
      - SERVE_UI=true
    volumes:
      - /home/diego/services_data/ai/paperclip/data:/paperclip
    depends_on:
      paperclip_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  paperclip_postgres:
    container_name: paperclip_postgres
    restart: unless-stopped
    image: postgres:18.3-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    env_file: paperclip.enc.env
    volumes:
      - /home/diego/services_data/ai/paperclip/postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=paperclip
      - POSTGRES_DB=paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:2.17.2@sha256:4e5be628f9eb05e3fde3cd242c84f6000165c95d2048d5076fcc569421ada4f3
    restart: unless-stopped
    env_file: n8n.enc.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n-local.rule=Host(`n8n.local.dynabase.nl`)"
      - "traefik.http.routers.n8n-local.entrypoints=https"
      - "traefik.http.routers.n8n-local.tls=true"
      - "traefik.http.routers.n8n-external.rule=Host(`n8n.dynabase.nl`)"
      - "traefik.http.routers.n8n-external.entrypoints=https"
      - "traefik.http.routers.n8n-external.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    environment:
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - TZ=Europe/Amsterdam
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - N8N_HOST=n8n.dynabase.nl
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.dynabase.nl/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_SCHEMA=public
    volumes:
      - /home/diego/services_data/ai/n8n/data:/home/node/.n8n
    depends_on:
      n8n_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: wget --spider http://localhost:5678/healthz > /dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  n8n_postgres:
    container_name: n8n_postgres
    restart: unless-stopped
    image: postgres:18.3-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    env_file: n8n.enc.env
    volumes:
      - /home/diego/services_data/ai/n8n/postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_DB=n8n
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


networks:
  default:
    external: true
    name: home_server_network
