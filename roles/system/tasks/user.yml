---
- name: Ensure all necessary groups are created
  ansible.builtin.group:
    name: "{{ item }}"
  loop:
    - docker
    - "{{ username }}"

- name: Ensure the non-root user is created
  ansible.builtin.user:
    name: "{{ username }}"
    password: "{{ vault_password | password_hash('sha512') }}"
    groups:
      - sudo
      - docker
      - users
    append: true
    shell: /bin/bash
    update_password: on_create
