---
- name: Check if services data folder exists
  ansible.builtin.stat:
    path: "{{ restore_services_data_dir }}"
  register: restore_services_data_folder_check

- name: Restore services data using Restic
  ansible.builtin.command:
    cmd: restic restore latest --target /
  become: false
  become_user: "{{ username }}"
  environment:
    RESTIC_REPOSITORY: "{{ restore_services_data_restic_repository }}"
    RESTIC_PASSWORD: "{{ restore_restic_password }}"
    AWS_ACCESS_KEY_ID: "{{ restore_aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ restore_aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "auto"
  changed_when: false
  when: not restore_services_data_folder_check.stat.exists

- name: Check if nextcloud data folder exists
  ansible.builtin.stat:
    path: "{{ restore_nextcloud_data_dir }}"
  register: restore_nextcloud_data_folder_check

- name: Restore nextcloud data using Restic
  ansible.builtin.command:
    cmd: restic restore latest --target /
  become: false
  become_user: "{{ username }}"
  environment:
    RESTIC_REPOSITORY: "{{ restore_nextcloud_restic_repository }}"
    RESTIC_PASSWORD: "{{ restore_restic_password }}"
    AWS_ACCESS_KEY_ID: "{{ restore_aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ restore_aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "auto"
  changed_when: false
  when: not restore_nextcloud_data_folder_check.stat.exists
