---
# Bootstrap for the `gitops/` stack (DocoCD). Everything below is the one-time /
# idempotent prep so the self-managed DocoCD container can take over deploys for
# every other category. DocoCD cannot manage its own compose file (recreating
# itself would kill the running deploy), so `gitops/` stays Ansible-managed.

- name: Ensure SOPS age key directory exists
  ansible.builtin.file:
    path: "/home/{{ username }}/.config/sops/age"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0700"

- name: Plant SOPS age secret key for DocoCD
  ansible.builtin.copy:
    dest: "/home/{{ username }}/.config/sops/age/keys.txt"
    content: "{{ vault_sops_age_key }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"
  no_log: true

- name: Ensure services data root exists
  ansible.builtin.file:
    path: "/home/{{ username }}/services_data"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Ensure cloudflared config directory exists
  ansible.builtin.file:
    path: "/home/{{ username }}/.config/cloudflared"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0700"

# cloudflared v2026.3 silently rejects TUNNEL_TOKEN via env var; plant the
# token as a host file and feed it to the container via --token-file.
- name: Plant Cloudflare tunnel token for networking stack
  ansible.builtin.copy:
    dest: "/home/{{ username }}/.config/cloudflared/tunnel_token"
    content: "{{ vault_cloudflared_tunnel_token }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    # 0644 because the bind-mount target is read by the distroless cloudflared
    # container (uid 65532); the enclosing ~/.config/cloudflared dir is 0700
    # so only diego can traverse it regardless.
    mode: "0644"
  no_log: true

- name: Ensure ~/bootstrap/gitops directory exists
  ansible.builtin.file:
    path: "/home/{{ username }}/bootstrap/gitops"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Sync bootstrap/gitops/docker-compose.yaml to the host
  ansible.builtin.copy:
    src: "{{ role_path }}/../../bootstrap/gitops/docker-compose.yaml"
    dest: "/home/{{ username }}/bootstrap/gitops/docker-compose.yaml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Template gitops .env from vault_docker_host_env.gitops
  ansible.builtin.copy:
    dest: "/home/{{ username }}/bootstrap/gitops/.env"
    content: "{% for k, v in vault_docker_host_env.gitops.items() %}{{ k }}={{ v }}\n{% endfor %}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"
  no_log: true
