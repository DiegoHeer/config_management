---
- name: Find all docker compose service directories
  ansible.builtin.find:
    paths: "{{ services_docker_src }}"
    file_type: directory
    depth: 1
  register: services_dirs
  when: services_run_compose

- name: Pull docker compose images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ item.path }}"
  loop: "{{ services_dirs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  become: true
  become_user: "{{ username }}"
  when: services_run_compose
  register: services_pull_result
  ignore_errors: true

- name: Report failed docker compose pulls
  vars:
    failed_pulls: >-
      {{ services_pull_result.results | default([])
         | selectattr('failed', 'defined') | selectattr('failed')
         | map(attribute='item') | map(attribute='path')
         | map('basename') | list }}
  ansible.builtin.debug:
    msg: "{{ failed_pulls }}"
  when:
    - services_run_compose
    - failed_pulls | length > 0

- name: Start docker compose stacks
  community.docker.docker_compose_v2:
    project_src: "{{ item.path }}"
    pull: never
    state: present
  loop: "{{ services_dirs.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  become: true
  become_user: "{{ username }}"
  when: services_run_compose
  timeout: 600
  register: services_compose_result
  ignore_errors: true

- name: Report failed docker compose stacks
  vars:
    failed_stacks: >-
      {{ services_compose_result.results | default([])
         | selectattr('failed', 'defined') | selectattr('failed')
         | map(attribute='item') | map(attribute='path')
         | map('basename') | list }}
  ansible.builtin.debug:
    msg: "{{ failed_stacks }}"
  when:
    - services_run_compose
    - failed_stacks | length > 0
