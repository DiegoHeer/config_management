---
- name: Check if Docker is already installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker
  ansible.builtin.include_role:
    name: haxorof.docker_ce
  vars:
    docker_sdk: true
    docker_compose: true
  when: docker_check.rc != 0
