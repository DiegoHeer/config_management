---
- name: Check if sops is installed
  ansible.builtin.command: sops --version
  register: services_sops_check
  changed_when: false
  failed_when: false

- name: Install sops from upstream .deb (not in Ubuntu apt)
  ansible.builtin.apt:
    deb: "https://github.com/getsops/sops/releases/download/\
      v{{ services_sops_version }}/sops_{{ services_sops_version }}_amd64.deb"
  when: services_sops_check.rc != 0

- name: Ensure SOPS age key directory exists
  ansible.builtin.file:
    path: "/home/{{ username }}/.config/sops/age"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0700"

- name: Plant SOPS age secret key for DocoCD
  ansible.builtin.copy:
    dest: "/home/{{ username }}/.config/sops/age/keys.txt"
    content: "{{ vault_sops_age_key }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"
  no_log: true

- name: Ensure services data root exists
  ansible.builtin.file:
    path: "/home/{{ username }}/services_data"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
