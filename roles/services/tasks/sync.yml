---
- name: Enumerate local service categories
  ansible.builtin.find:
    paths: "{{ services_local_src }}"
    file_type: directory
    recurse: false
  delegate_to: localhost
  register: services_source_dirs

- name: Sync per-category compose trees to server (skip DocoCD-managed)
  ansible.builtin.copy:
    src: "{{ item.path }}/"
    dest: "{{ services_docker_src }}/{{ item.path | basename }}/"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop: "{{ services_source_dirs.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: item.path | basename not in services_migrated_categories
