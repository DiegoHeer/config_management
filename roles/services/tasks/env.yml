---
- name: Deploy .env files for docker compose services
  ansible.builtin.copy:
    dest: "{{ services_docker_src }}/{{ item.key }}/.env"
    content: "{% for k, v in item.value.items() %}{{ k }}={{ v }}\n{% endfor %}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"
  loop: "{{ vault_services_env | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.key not in services_migrated_categories
  no_log: true
