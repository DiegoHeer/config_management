---
- name: Prepare for system role
  hosts: localhost
  tasks:
    - name: Ensure .ssh directory exists on control machine
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') + '/.ssh' }}"
        state: directory
        mode: "0700"

    - name: Generate SSH keypair for molecule test
      community.crypto.openssh_keypair:
        path: "{{ lookup('env', 'HOME') + '/.ssh/id_ed25519' }}"
        type: ed25519
        state: present
