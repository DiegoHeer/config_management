# DocoCD stack registry.
# Append a `---` block per category as it migrates from Ansible to DocoCD.
# Auto-discovery stays off; each managed stack is listed explicitly.
#
# NOT listed here on purpose:
# - gitops/: DocoCD cannot manage its own container (self-deploy kills the
#   running process mid-recreate). It stays Ansible-managed forever.
auto_discover: false
