---
name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Cache Galaxy roles
        uses: actions/cache@v4
        with:
          path: .venv/.ansible/roles
          key: galaxy-${{ hashFiles('requirements.yml') }}

      - name: Install Galaxy roles
        run: uv run ansible-galaxy install -r requirements.yml

      - name: Create Ansible vault key
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_key

      - name: Run yamllint
        run: uv run yamllint .

      - name: Run ansible-lint
        run: uv run ansible-lint

  molecule:
    name: Molecule - ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - system
          - projects
          - services
          - restore
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Cache Galaxy roles
        uses: actions/cache@v4
        with:
          path: .venv/.ansible/roles
          key: galaxy-${{ hashFiles('requirements.yml') }}

      - name: Install Galaxy roles
        run: uv run ansible-galaxy install -r requirements.yml

      - name: Create Ansible vault key
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_key

      - name: Run Molecule
        run: uv run molecule test -s ${{ matrix.scenario }}
