---
name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ansible dependencies
        uses: ./.github/actions/setup-ansible-deps
        with:
          vault-password: ${{ secrets.VAULT_PASSWORD }}

      - name: Run yamllint
        run: uv run yamllint .

      - name: Run ansible-lint
        run: uv run ansible-lint

  molecule:
    name: Molecule - ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - system
          - projects
          - services
          - restore
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ansible dependencies
        uses: ./.github/actions/setup-ansible-deps
        with:
          vault-password: ${{ secrets.VAULT_PASSWORD }}

      - name: Run Molecule
        run: uv run molecule test -s ${{ matrix.scenario }}
