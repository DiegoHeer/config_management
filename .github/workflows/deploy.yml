---
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Home Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Cache Galaxy roles
        uses: actions/cache@v4
        with:
          path: .venv/.ansible/roles
          key: galaxy-${{ hashFiles('requirements.yml') }}

      - name: Install Galaxy roles
        run: uv run ansible-galaxy install -r requirements.yml

      - name: Create Ansible vault key
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_key

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Create deploy inventory
        run: |
          cat > deploy_inventory.yml <<EOF
          home_lab:
            hosts:
              home_server:
                ansible_host: ${{ secrets.TAILSCALE_SERVER_IP }}
                ansible_user: ${{ secrets.SERVER_USER }}
            vars:
              username: ${{ secrets.SERVER_USER }}
          EOF

      - name: Run Ansible playbook
        run: >-
          uv run ansible-playbook playbooks/home_server.yml
          -i deploy_inventory.yml
