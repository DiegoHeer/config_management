---
name: Configure Home Server

on:
  push:
    branches: [main]
    paths:
      - 'playbooks/**'
      - 'roles/**'
      - 'requirements.yml'
      - '.github/workflows/configure-home-server.yml'
      - '.github/actions/setup-ansible/**'
      - '.github/actions/setup-ansible-deps/**'
  workflow_dispatch:

jobs:
  configure-server:
    name: Configure Home Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ansible dependencies
        uses: ./.github/actions/setup-ansible-deps
        with:
          vault-password: ${{ secrets.VAULT_PASSWORD }}

      - name: Setup Ansible environment
        uses: ./.github/actions/setup-ansible
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-client-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tailscale-server-ip: ${{ secrets.TAILSCALE_SERVER_IP }}
          server-user: ${{ secrets.SERVER_USER }}

      - name: Run Ansible playbook
        run: >-
          uv run ansible-playbook playbooks/update_home_server.yml
          -i deploy_inventory.yml
